<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sázkařský Deník v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070f;overflow:hidden}
.app{display:flex;height:100vh;background:#07070f;color:#ddd8cc;font-family:Georgia,serif;font-size:15px;position:relative}
.sidebar{width:200px;background:#0b0b17;border-right:1px solid #181828;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:18px 16px 14px;border-bottom:1px solid #181828}
.logo-t{font-size:16px;color:#d4af37;font-weight:700;line-height:1.3}
.logo-s{font-size:9px;color:#2a2a3a;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;border-radius:7px;border:none;cursor:pointer;font-size:14px;font-family:Georgia,serif;background:transparent;color:#555;border-left:2px solid transparent;margin-bottom:2px}
.nb.active{background:#13132a;color:#d4af37;border-left-color:#d4af37}
.balances{padding:0 8px 10px;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:12px 20px;border-bottom:1px solid #181828;display:flex;align-items:center;justify-content:space-between;background:#09090f;flex-shrink:0;gap:8px}
.content{flex:1;overflow-y:auto;padding:16px 20px}
.card{background:#0f0f1e;border:1px solid #1a1a2e;border-radius:10px;padding:16px}
.btn-gold{background:linear-gradient(135deg,#d4af37,#b8962e);border:none;border-radius:7px;color:#000;font-weight:700;font-size:12px;padding:7px 14px;cursor:pointer;font-family:Georgia,serif;white-space:nowrap}
.btn-sm{background:transparent;border:1px solid #252535;border-radius:5px;color:#555;font-size:11px;padding:4px 8px;cursor:pointer;font-family:Georgia,serif}
.btn-d{background:transparent;border:1px solid #3a1515;border-radius:5px;color:#ef4444;font-size:11px;padding:4px 8px;cursor:pointer;font-family:Georgia,serif}
.btn-ghost{background:transparent;border:1px solid #252535;border-radius:7px;color:#555;font-size:12px;padding:7px 14px;cursor:pointer;font-family:Georgia,serif}
.btn-blue{background:transparent;border:1px solid #0a3a5a;border-radius:5px;color:#38bdf8;font-size:11px;padding:4px 8px;cursor:pointer;font-family:Georgia,serif}
.btn-green{background:transparent;border:1px solid #0a3a1e;border-radius:5px;color:#10b981;font-size:11px;padding:4px 8px;cursor:pointer;font-family:Georgia,serif}
.input{background:#07070f;border:1px solid #252535;border-radius:7px;color:#ddd8cc;padding:8px 10px;font-size:13px;font-family:Georgia,serif;outline:none;width:100%}
.select{background:#07070f;border:1px solid #252535;border-radius:7px;color:#ddd8cc;padding:8px 10px;font-size:13px;font-family:Georgia,serif;outline:none;width:100%}
.fl{display:block;font-size:9px;color:#454555;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.th{display:grid;padding:7px 14px;background:#07070f;font-size:9px;color:#383848;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid #181828}
.tr{display:grid;padding:9px 14px;align-items:center;border-bottom:1px solid #0e0e1e;font-size:12px}
.tr.alt{background:#0a0a17}
.tab-bar{display:flex;gap:2px;margin-bottom:16px;background:#0a0a17;border-radius:8px;padding:3px}
.tab-btn{flex:1;padding:6px;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-family:Georgia,serif;background:transparent;color:#555}
.tab-btn.active{background:#1a1a2e;color:#d4af37}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-t">📒 Sázkařský<br>Deník</div>
      <div class="logo-s">Betting Journal</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="balances">
      <div style="font-size:9px;color:#2a2a3a;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;padding-left:4px">Zůstatky</div>
      <div id="sideBalances"></div>
      <div style="display:flex;justify-content:space-between;padding:6px 6px 0;border-top:1px solid #181828;margin-top:4px">
        <span style="font-size:10px;color:#333">Celkem</span>
        <span style="font-size:11px;font-family:monospace;color:#d4af37" id="sideTotal"></span>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="topbar" id="topbar"></div>
    <div class="content" id="content"></div>
  </div>
  <div id="modalLayer" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;padding:16px"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const TABS=[{id:"overview",icon:"◈",label:"Přehled"},{id:"bm",icon:"◉",label:"Kanceláře"},{id:"services",icon:"◇",label:"Servisy"},{id:"finance",icon:"◆",label:"Finance"},{id:"stats",icon:"◐",label:"Statistiky"},{id:"settings",icon:"⚙",label:"Nastavení"}];
const ACCOUNT_TYPES=[{id:"bank",icon:"🏦",label:"Banka"},{id:"ewallet",icon:"💳",label:"E-peněženka"},{id:"cash",icon:"💵",label:"Hotovost"},{id:"crypto",icon:"₿",label:"Krypto"},{id:"other",icon:"📂",label:"Jiné"}];
function loadState(){try{const s=localStorage.getItem("sazky-v4");return s?JSON.parse(s):null;}catch{return null;}}
function saveState(){try{localStorage.setItem("sazky-v4",JSON.stringify({bookmakers:state.bookmakers,accounts:state.accounts,bets:state.bets,transactions:state.transactions,services:state.services,eurRate:state.eurRate,globalUnit:state.globalUnit,snapshots:state.snapshots,finTab:state.finTab}));}catch{}}
const saved=loadState();
let state={
  tab:"overview",svcDetail:null,finTab:"accounts",
  globalUnit:saved?.globalUnit||500,
  eurRate:saved?.eurRate||25.18,eurRateSource:null,
  bookmakers:saved?.bookmakers||[{id:1,name:"Tipsport",currency:"CZK",color:"#e63946",balance:2475},{id:2,name:"Fortuna",currency:"CZK",color:"#f77f00",balance:890},{id:3,name:"Bet365",currency:"EUR",color:"#0077b6",balance:134.5}],
  accounts:saved?.accounts||[{id:1,name:"Raiffeisenbank",type:"bank",currency:"CZK",color:"#ffd700",balance:45000,note:"Hlavní účet"},{id:2,name:"Revolut",type:"ewallet",currency:"EUR",color:"#0066ff",balance:380,note:"Online platby"},{id:3,name:"Skrill",type:"ewallet",currency:"EUR",color:"#8b1a1a",balance:95,note:"Sázkové vklady"},{id:4,name:"Hotovost",type:"cash",currency:"CZK",color:"#10b981",balance:3200,note:""}],
  bets:saved?.bets||[{id:101,svcId:1,date:"2025-01-05",bmId:1,type:"single",match:"Man City vs Arsenal",tip:"Man City",odds:1.95,stake:500,result:"win",note:""},{id:102,svcId:1,date:"2025-01-12",bmId:1,type:"single",match:"Sparta vs Slavia",tip:"Remíza",odds:3.20,stake:300,result:"loss",note:""},{id:103,svcId:1,date:"2025-01-20",bmId:2,type:"single",match:"Djokovic vs Alcaraz",tip:"Alcaraz",odds:1.75,stake:400,result:"win",note:""},{id:104,svcId:1,date:"2025-02-03",bmId:1,type:"acca",match:"LM Akumulátor",tip:"3× vítěz",odds:5.20,stake:200,result:"win",note:""},{id:105,svcId:1,date:"2025-02-14",bmId:2,type:"single",match:"Real vs Barcelona",tip:"Oba dají gól",odds:1.65,stake:600,result:"loss",note:""},{id:106,svcId:1,date:"2025-02-28",bmId:1,type:"single",match:"Liverpool vs Chelsea",tip:"Liverpool",odds:2.10,stake:500,result:"win",note:""},{id:107,svcId:1,date:"2025-03-05",bmId:1,type:"single",match:"Nadal vs Medvedev",tip:"Nadal",odds:1.85,stake:300,result:"win",note:""},{id:108,svcId:1,date:"2025-03-10",bmId:2,type:"single",match:"Bayern vs Dortmund",tip:"Bayern",odds:1.55,stake:400,result:"pending",note:""},{id:201,svcId:2,date:"2025-03-01",bmId:3,type:"single",match:"PSG vs Lyon",tip:"PSG",odds:1.45,stake:50,result:"win",note:""},{id:202,svcId:2,date:"2025-03-07",bmId:3,type:"single",match:"Atletico vs Sevilla",tip:"Atletico",odds:1.90,stake:30,result:"loss",note:""}],
  transactions:saved?.transactions||[{id:1,date:"2025-01-01",type:"deposit",currency:"CZK",amount:5000,note:"Počáteční vklad Tipsport"},{id:2,date:"2025-02-01",type:"deposit",currency:"EUR",amount:150,note:"Bet365 dobití"},{id:3,date:"2025-03-01",type:"withdrawal",currency:"CZK",amount:1000,note:"Výběr výhry → RB"}],
  services:saved?.services||[{id:1,name:"BettingPro CZ",price:599,currency:"CZK",dateFrom:"2025-01-01",dateTo:"2025-06-30",unitValue:500,note:"Specializace na fotbal"},{id:2,name:"TipZone EU",price:29,currency:"EUR",dateFrom:"2025-03-01",dateTo:"",unitValue:null,note:"Teprve zkouším"}],
  snapshots:saved?.snapshots||[],
  fResult:"all"
};
(function(){const t=new Date().toISOString().slice(0,10);const l=state.snapshots[state.snapshots.length-1];if(!l||l.date!==t)takeSnapshot("auto");})();
function takeSnapshot(type="manual"){const t=new Date().toISOString().slice(0,10);const now=new Date().toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit"});const snap={id:Date.now(),date:t,time:now,type,bookmakers:state.bookmakers.map(b=>({id:b.id,name:b.name,balance:b.balance,currency:b.currency})),accounts:state.accounts.map(a=>({id:a.id,name:a.name,balance:a.balance,currency:a.currency})),totalBM:Math.round(totalBMCZK()),totalAcc:Math.round(totalAccCZK()),totalAll:Math.round(totalBMCZK()+totalAccCZK())};state.snapshots.push(snap);if(state.snapshots.length>60)state.snapshots=state.snapshots.slice(-60);saveState();}
const fmtCur=(n,cur)=>cur==="EUR"?`€${Number(n).toFixed(2)}`:`${Math.round(n).toLocaleString("cs-CZ")} Kč`;
const toCZK=(n,cur)=>cur==="EUR"?n*state.eurRate:n;
const getBM=(id)=>state.bookmakers.find(b=>b.id===Number(id));
const getSvc=(id)=>state.services.find(s=>s.id===Number(id));
const today=()=>new Date().toISOString().slice(0,10);
const totalBMCZK=()=>state.bookmakers.reduce((s,bm)=>s+toCZK(Number(bm.balance||0),bm.currency),0);
const totalAccCZK=()=>state.accounts.reduce((s,a)=>s+toCZK(Number(a.balance||0),a.currency),0);
const totalAllCZK=()=>totalBMCZK()+totalAccCZK();
function betProfit(b){if(b.result==="win")return Number(b.stake)*Number(b.odds)-Number(b.stake);if(b.result==="loss")return -Number(b.stake);return 0;}
function tagHtml(r){const m={win:"background:#0d2a1e;color:#10b981",loss:"background:#2a0d0d;color:#ef4444",void:"background:#1a1a2a;color:#6b7280",pending:"background:#2a1e0d;color:#f59e0b"};const l={win:"Výhra",loss:"Prohra",void:"Void",pending:"Čeká se"};return`<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;${m[r]||m.void};display:inline-block">${l[r]||r}</span>`;}
function accTypeInfo(type){return ACCOUNT_TYPES.find(t=>t.id===type)||ACCOUNT_TYPES[4];}
function render(){
  document.getElementById("nav").innerHTML=TABS.map(t=>`<button class="nb${state.tab===t.id&&!state.svcDetail?" active":""}" onclick="setTab('${t.id}')"><span style="font-size:13px">${t.icon}</span><span>${t.label}</span></button>`).join("");
  document.getElementById("sideBalances").innerHTML=state.bookmakers.map(bm=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 6px;margin-bottom:1px"><span style="font-size:11px;color:#555;display:flex;align-items:center"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${bm.color};margin-right:5px"></span>${bm.name}</span><span style="font-size:11px;font-family:monospace;color:${Number(bm.balance||0)>=0?"#10b981":"#ef4444"}">${fmtCur(bm.balance||0,bm.currency)}</span></div>`).join("");
  document.getElementById("sideTotal").textContent=Math.round(totalBMCZK()).toLocaleString("cs-CZ")+" Kč";
  if(state.svcDetail)renderSvcDetail(state.svcDetail);
  else if(state.tab==="finance")renderFinance();
  else if(state.tab==="overview")renderOverview();
  else if(state.tab==="bm")renderBM();
  else if(state.tab==="services")renderServices();
  else if(state.tab==="stats")renderStats();
  else if(state.tab==="settings")renderSettings();
  saveState();
}
function setTab(t){state.tab=t;state.svcDetail=null;render();}
function setTopbar(title,sub,btnHtml){document.getElementById("topbar").innerHTML=`<div style="min-width:0;flex:1"><div style="font-size:16px;color:#ddd8cc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${title}</div>${sub?`<div style="font-size:10px;color:#333;margin-top:1px">${sub}</div>`:""}</div><div style="display:flex;gap:8px;flex-shrink:0">${btnHtml||""}</div>`;}
function renderFinance(){
  setTopbar("Finance","",`<button class="btn-green" onclick="takeSnapshot('manual');render()">📸 Snapshot</button><button class="btn-gold" onclick="openTxModal()">+ Transakce</button>`);
  document.getElementById("content").innerHTML=`<div class="tab-bar"><button class="tab-btn${state.finTab==="accounts"?" active":""}" onclick="setFinTab('accounts')">Účty & Peněženky</button><button class="tab-btn${state.finTab==="bookmakers"?" active":""}" onclick="setFinTab('bookmakers')">Sázkové kanceláře</button><button class="tab-btn${state.finTab==="history"?" active":""}" onclick="setFinTab('history')">Historie</button><button class="tab-btn${state.finTab==="snapshots"?" active":""}" onclick="setFinTab('snapshots')">Snapshoty</button></div><div id="finContent"></div>`;
  renderFinTab();
}
function setFinTab(t){state.finTab=t;renderFinTab();}
function renderFinTab(){const c=document.getElementById("finContent");if(!c)return;if(state.finTab==="accounts")renderFinAccounts(c);if(state.finTab==="bookmakers")renderFinBM(c);if(state.finTab==="history")renderFinHistory(c);if(state.finTab==="snapshots")renderFinSnapshots(c);}
function renderFinAccounts(c){
  const totalAcc=totalAccCZK();const totalBM=totalBMCZK();const grandTotal=totalAcc+totalBM;
  const byType={};state.accounts.forEach(a=>{if(!byType[a.type])byType[a.type]=[];byType[a.type].push(a);});
  c.innerHTML=`
    <div style="background:linear-gradient(135deg,#111120,#18140a);border:1px solid #25200a;border-radius:10px;padding:16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div><div style="font-size:9px;color:#454555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">Celkem (účty)</div><div style="font-size:20px;font-weight:700;font-family:monospace;color:#d4af37">${Math.round(totalAcc).toLocaleString("cs-CZ")} Kč</div></div>
      <div><div style="font-size:9px;color:#454555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">Celkem (kanceláře)</div><div style="font-size:20px;font-weight:700;font-family:monospace;color:#10b981">${Math.round(totalBM).toLocaleString("cs-CZ")} Kč</div></div>
      <div><div style="font-size:9px;color:#454555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">CELKEM VŠE</div><div style="font-size:24px;font-weight:700;font-family:monospace;color:#d4af37">${Math.round(grandTotal).toLocaleString("cs-CZ")} Kč</div></div>
    </div>
    ${state.accounts.some(a=>a.currency==="EUR")||state.bookmakers.some(b=>b.currency==="EUR")?`<div class="card" style="display:flex;align-items:center;gap:12px;padding:10px 16px;margin-bottom:14px;flex-wrap:wrap"><span style="font-size:9px;color:#454555;letter-spacing:1.5px;text-transform:uppercase">EUR / CZK</span><span style="font-size:17px;font-weight:700;font-family:monospace;color:#d4af37">${state.eurRate.toFixed(2)} Kč</span>${state.eurRateSource==="live"?'<span style="font-size:10px;color:#10b981;background:#0d2a1e;padding:2px 8px;border-radius:8px">✓ živý</span>':""}<div style="display:flex;gap:6px;margin-left:auto"><button class="btn-blue" onclick="fetchEur()">⟳ Aktualizovat</button><button class="btn-sm" onclick="setEurManual()">✎ Ručně</button></div></div>`:""}
    ${Object.keys(byType).map(type=>{const info=accTypeInfo(type);const accs=byType[type];const typeTotal=accs.reduce((s,a)=>s+toCZK(Number(a.balance||0),a.currency),0);return`<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:10px;color:#383848;letter-spacing:1.5px;text-transform:uppercase">${info.icon} ${info.label}</div><div style="font-size:11px;font-family:monospace;color:#555">${Math.round(typeTotal).toLocaleString("cs-CZ")} Kč</div></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">${accs.map(a=>`<div class="card" style="border-left:4px solid ${a.color};padding:12px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div><div style="font-size:14px;font-weight:700">${a.name}</div>${a.note?`<div style="font-size:10px;color:#454555;margin-top:2px">${a.note}</div>`:""}</div><div style="display:flex;gap:4px"><button class="btn-sm" onclick="openAccModal(${a.id})">✎</button><button class="btn-d" onclick="deleteAcc(${a.id})">✕</button></div></div><div style="font-size:24px;font-weight:700;font-family:monospace;color:${Number(a.balance||0)>=0?"#10b981":"#ef4444"}">${fmtCur(a.balance||0,a.currency)}</div>${a.currency==="EUR"?`<div style="font-size:11px;font-family:monospace;color:#555;margin-top:3px">≈ ${Math.round(toCZK(Number(a.balance||0),"EUR")).toLocaleString("cs-CZ")} Kč</div>`:""}<div style="margin-top:8px;padding-top:8px;border-top:1px solid #181828;display:flex;justify-content:space-between;align-items:center"><span style="font-size:9px;color:#383848">${info.icon} ${info.label}</span><span style="font-size:10px;color:#555;background:#111;padding:1px 7px;border-radius:6px">${a.currency}</span></div></div>`).join("")}<div style="border:2px dashed #1a1a2e;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;min-height:100px" onclick="openAccModal(0,'${type}')"><span style="font-size:20px;color:#252535">+</span><span style="font-size:10px;color:#383848">Přidat ${info.label.toLowerCase()}</span></div></div></div>`;}).join("")}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">${ACCOUNT_TYPES.map(t=>`<button class="btn-sm" onclick="openAccModal(0,'${t.id}')" style="font-size:12px;padding:6px 12px">${t.icon} + ${t.label}</button>`).join("")}</div>`;
}
function renderFinBM(c){const totalBM=totalBMCZK();c.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px">${state.bookmakers.map(bm=>`<div class="card" style="border-left:4px solid ${bm.color};padding:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${bm.color}"></span><span style="font-size:14px;font-weight:700">${bm.name}</span></div><button class="btn-sm" onclick="openBmModal(${bm.id})">✎</button></div><div style="font-size:24px;font-weight:700;font-family:monospace;color:${Number(bm.balance||0)>=0?"#10b981":"#ef4444"}">${fmtCur(bm.balance||0,bm.currency)}</div>${bm.currency==="EUR"?`<div style="font-size:11px;font-family:monospace;color:#555;margin-top:2px">≈ ${Math.round(toCZK(Number(bm.balance||0),"EUR")).toLocaleString("cs-CZ")} Kč</div>`:""}</div>`).join("")}</div><div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:12px 18px"><span style="font-size:11px;color:#555">Celkem na sázkových kontách</span><span style="font-size:20px;font-weight:700;font-family:monospace;color:#10b981">${Math.round(totalBM).toLocaleString("cs-CZ")} Kč</span></div>`;}
function renderFinHistory(c){
  const byMonth={};[...state.transactions].sort((a,b)=>b.date.localeCompare(a.date)).forEach(tx=>{const m=tx.date.slice(0,7);if(!byMonth[m])byMonth[m]=[];byMonth[m].push(tx);});
  const months=Object.keys(byMonth).sort().reverse();

function editBm(id){openBmModal(id);}
function deleteBm(id){if(!confirm("Smazat?"))return;state.bookmakers=state.bookmakers.filter(b=>b.id!==id);render();}
function openTxModal(){showModal(`${mHead("Nová transakce")}${fg(`<div><label class="fl">Datum</label><input class="input" type="date" id="tx_date" value="${today()}"></div><div><label class="fl">Typ</label><select class="select" id="tx_type"><option value="deposit">▲ Vklad / Příjem</option><option value="withdrawal">▼ Výběr / Výdaj</option></select></div><div><label class="fl">Měna</label><select class="select" id="tx_cur"><option value="CZK">CZK</option><option value="EUR">EUR</option></select></div><div><label class="fl">Částka</label><input class="input" type="number" id="tx_amt" placeholder="1000"></div><div style="grid-column:1/-1"><label class="fl">Poznámka</label><input class="input" type="text" id="tx_note" placeholder="např. výběr z Tipsportu na Revolut"></div>`)}<div style="display:flex;gap:8px;margin-top:16px"><button class="btn-gold" onclick="saveTx()">Uložit</button><button class="btn-ghost" onclick="closeModal()">Zrušit</button></div>`);}
function saveTx(){const t={date:document.getElementById("tx_date").value,type:document.getElementById("tx_type").value,currency:document.getElementById("tx_cur").value,amount:Number(document.getElementById("tx_amt").value),note:document.getElementById("tx_note").value};if(!t.amount)return;state.transactions.push({...t,id:Date.now()});closeModal();}
function deleteTx(id){state.transactions=state.transactions.filter(t=>t.id!==id);render();}
async function fetchEur(){try{const r=await fetch("https://api.frankfurter.app/latest?from=EUR&to=CZK");const d=await r.json();if(d?.rates?.CZK){state.eurRate=Math.round(d.rates.CZK*100)/100;state.eurRateSource="live";render();}}catch{alert("Nepodařilo se načíst kurz.");}}
function setEurManual(){const v=prompt("EUR/CZK kurz:",state.eurRate);const n=parseFloat(v);if(n>0){state.eurRate=n;state.eurRateSource="manual";render();}}
render();
</script>
</body>
</html>
